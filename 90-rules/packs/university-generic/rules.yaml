project:
  main_tex_candidates:
    - main.tex
    - thesis.tex
  chapter_globs:
    - chapters/*.tex
    - data/chap*.tex
  bibliography_files:
    - ref/refs.bib
    - ref/refs-import.bib
reference:
  missing_key:
    severity: error
  orphan_entry:
    severity: warning
  duplicate_title:
    severity: warning
  bib_quality:
    require_langid: false
    allowed_entry_types:
      - article
      - book
      - inproceedings
      - misc
    missing_langid:
      severity: warning
    malformed_doi:
      severity: warning
    unsupported_entry_type:
      severity: warning
language:
  cjk_latin_spacing:
    enabled: true
    severity: warning
    autofix_safe: true
  repeated_punctuation:
    enabled: true
    severity: error
    autofix_safe: true
  mixed_quote_style:
    enabled: true
    severity: warning
    autofix_safe: false
  weak_phrases:
    enabled: true
    severity: info
    autofix_safe: false
    patterns:
      - 众所周知
      - 不难看出
  bracket_mismatch:
    enabled: true
    severity: error
    autofix_safe: false
  quote_mismatch:
    enabled: true
    severity: error
    autofix_safe: false
  booktitle_mixed_style:
    enabled: true
    severity: warning
    autofix_safe: false
  unit_spacing:
    enabled: true
    severity: warning
    autofix_safe: true
  ellipsis_style:
    enabled: true
    severity: warning
    autofix_safe: true
  dash_style:
    enabled: true
    severity: info
    autofix_safe: false
  zh_en_symbol_spacing:
    enabled: true
    severity: warning
    autofix_safe: false
  number_range_style:
    enabled: true
    severity: info
    autofix_safe: false
  enum_punctuation_style:
    enabled: true
    severity: info
    autofix_safe: false
  connector_blacklist_simple:
    enabled: true
    severity: info
    autofix_safe: false
    patterns:
      - 因此所以
      - 但是同时
      - 并且同时
  fullwidth_halfwidth_mix:
    enabled: true
    severity: warning
    autofix_safe: true
language_deep:
  connector_misuse:
    enabled: true
    severity: warning
    min_confidence: 0.72
    review_required: true
    patterns:
      因此所以:
        message: Connector chain may be redundant
        suggestions:
          - 因此
          - 所以
      但是同时:
        message: Connector chain may be redundant
        suggestions:
          - 但是
          - 同时
  collocation_misuse:
    enabled: true
    severity: warning
    min_confidence: 0.75
    review_required: true
    patterns:
      提升效率水平:
        message: Collocation may be awkward or redundant
        suggestions:
          - 提升效率
          - 提高水平
      进行优化改善:
        message: Collocation may be awkward or redundant
        suggestions:
          - 进行优化
          - 加以改善
  acronym_first_use:
    enabled: true
    severity: warning
    min_confidence: 0.85
    review_required: true
    require_expansion_before_short_form: true
    acronyms:
      DID:
        expansions:
          - 双重差分
          - Difference-in-Differences
      PSM:
        expansions:
          - 倾向得分匹配
          - Propensity Score Matching
consistency:
  terminology_consistency:
    enabled: true
    severity: warning
    min_confidence: 0.8
    review_required: true
    min_occurrences: 2
    groups:
      双重差分:
        variants:
          - 双重差分法
          - Difference-in-Differences
      大型语言模型:
        variants:
          - 大语言模型
          - LLM
format:
  require_list_of_figures: false
  require_list_of_tables: false
  figure_requires_centering: true
content:
  required_sections:
    - Introduction
    - Methods
  abstract_keywords:
    min: 3
    max: 8
