project:
  main_tex_candidates:
    - thuthesis-example.tex
    - thesis.tex
    - main.tex
  chapter_globs:
    - chapters/*.tex
    - data/chap*.tex
  bibliography_files:
    - ref/refs.bib
    - ref/refs-import.bib
reference:
  missing_key:
    severity: error
  orphan_entry:
    severity: warning
  duplicate_title:
    severity: warning
  bib_quality:
    require_langid: true
    allowed_entry_types:
      - article
      - book
      - inproceedings
      - misc
      - phdthesis
      - mastersthesis
      - online
    missing_langid:
      severity: warning
    malformed_doi:
      severity: warning
    unsupported_entry_type:
      severity: warning
language:
  cjk_latin_spacing:
    enabled: true
    severity: warning
  repeated_punctuation:
    enabled: true
    severity: error
  mixed_quote_style:
    enabled: true
    severity: warning
  weak_phrases:
    enabled: true
    severity: info
    patterns:
      - 众所周知
      - 不难看出
      - 本文将
format:
  require_list_of_figures: true
  require_list_of_tables: true
  figure_requires_centering: true
content:
  required_sections:
    - Introduction
    - Methods
  abstract_keywords:
    min: 3
    max: 8
