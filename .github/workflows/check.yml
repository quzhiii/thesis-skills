name: checker-smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tsinghua rules smoke check
        run: |
          set +e
          python run_check_once.py --project-root "examples/minimal-latex-project" --ruleset "tsinghua-thesis" --skip-compile
          status=$?
          if [ "$status" -gt 1 ]; then
            exit "$status"
          fi

      - name: Run university rules smoke check
        run: |
          set +e
          python run_check_once.py --project-root "examples/minimal-latex-project" --ruleset "university-generic" --skip-compile
          status=$?
          if [ "$status" -gt 1 ]; then
            exit "$status"
          fi

      - name: Run baseline hardening regressions
        run: python -m unittest tests.test_language_checker tests.test_language_deep_checker tests.test_consistency tests.test_patch_preview tests.test_language_deep_fixer tests.test_fixers tests.test_manifest tests.test_runner
